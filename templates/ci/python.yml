name: ci
on:
  push:
    branches: [main, master]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy . || true
      - run: uv run pytest -v
